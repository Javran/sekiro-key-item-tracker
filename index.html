<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta content="utf-8" http-equiv="encoding">
  <title>Sekiro Key Item Tracker</title>
  <link rel="stylesheet" href="main.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="https://sekii.gitlab.io/sekiro-tracker/img/icon.ico">
  <meta property="og:title" content="Sekiro Key Item Tracker">
  <meta property="og:description" content="Tool to track Key Items in Sekiro Randomizer - Key Items assumed to be placed on important locations">
  <meta property="og:image" content="https://sekii.gitlab.io/sekiro-tracker/img/banner.jpg">
  <meta name="twitter:card" content="summary_large_image">
</head>

<body>
  <div id="inventory-container" class="sticky">
  </div>

  <div id="control-panel">
    <div class="control-group">
      <span>Top texts</span>
      <label>Invasion <input type="color" id="color-invasion" value="#66ff66"></label>
      <label>Dragon <input type="color" id="color-dragon" value="#6666ff"></label>
      <label>Finish <input type="color" id="color-finish" value="#ff6666"></label>
      <label>Size <input type="range" id="size-top" min="12" max="36" value="21"> <span id="size-top-value">21</span></label>
    </div>

    <div class="control-group">
      <span>Left column</span>
      <label>Required <input type="color" id="color-required" value="#ffffff"></label>
      <label>Keys <input type="color" id="color-keys" value="#ffff00"></label>
      <label>Size <input type="range" id="size-left" min="12" max="36" value="21"> <span id="size-left-value">21</span></label>
    </div>

    <div class="control-group">
      <span>Items</span>
      <label>Invasion <input type="color" id="border-invasion" value="#00ff00"></label>
      <label>Dragon <input type="color" id="border-dragon" value="#0064ff"></label>
      <label>Finish <input type="color" id="border-finish" value="#ff0000"></label>
      <label>Key <input type="color" id="border-key" value="#ffff00"></label>
      <label>Border <input type="range" id="border-thickness" min="1" max="10" value="5"> <span id="border-thickness-value">5</span></label>
    </div>

    <div class="control-group">
      <span>Misc.</span>
      <label>Transparent BG <input type="checkbox" id="transparent-bg"></label>
      <label>Reset items? <input type="checkbox" id="reset-confirm"></label>
      <button id="reset-btn" disabled>Reset</button>
    </div>

    <div class="control-group">
      <span>Appearance</span>
      <button id="save-style">Save</button>
      <button id="load-style">Load</button>
      <label>Reset to default? <input type="checkbox" id="style-reset-confirm"></label>
      <button id="style-reset-btn" disabled>Reset</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>

</html>
