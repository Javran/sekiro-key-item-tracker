<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta content="utf-8" http-equiv="encoding">
  <title>Sekiro Key Item Tracker</title>
  <link rel="stylesheet" href="main.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="https://sekii.gitlab.io/sekiro-tracker/img/icon.ico">
  <meta property="og:title" content="Sekiro Key Item Tracker">
  <meta property="og:description" content="Tool to track Key Items in Sekiro Randomizer - Key Items assumed to be placed on important locations">
  <meta property="og:image" content="https://sekii.gitlab.io/sekiro-tracker/img/banner.jpg">
  <meta name="twitter:card" content="summary_large_image">
</head>

<body>
  <div class="sticky">
    <br>
    <div class="element">
      <img class="inventory" alt="Prosthetic Tool" src="img/prosthetic_tool.png" id="owned_prosthetic_tool">
      <div id="tooltip_owned_prosthetic_tool" class="invisible tooltip inventory">Prosthetic Tool</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Bell Charm" src="img/bell_charm.png" id="owned_bell_charm">
      <div id="tooltip_owned_bell_charm" class="invisible tooltip inventory">Bell Charm</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Gatehouse Key" src="img/gatehouse_key.png" id="owned_gatehouse_key">
      <div id="tooltip_owned_gatehouse_key" class="invisible tooltip inventory">Gatehouse Key</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Gun Fort Shrine Key" src="img/gun_fort_shrine_key.png" id="owned_gun_fort_shrine_key">
      <div id="tooltip_owned_gun_fort_shrine_key" class="invisible tooltip inventory">Gun Fort Shrine Key</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Hidden Temple Key" src="img/hidden_temple_key.png" id="owned_hidden_temple_key">
      <div id="tooltip_owned_hidden_temple_key" class="invisible tooltip inventory">Hidden Temple Key</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Secret Passage Key" src="img/secret_passage_key.png" id="owned_secret_passage_key">
      <div id="tooltip_owned_secret_passage_key" class="invisible tooltip inventory">Secret Passage Key</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Lotus of the Palace" src="img/lotus_of_the_palace.png" id="owned_lotus_of_the_palace">
      <div id="tooltip_owned_lotus_of_the_palace" class="invisible tooltip inventory">Lotus of the Palace</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Shelter Stone" src="img/shelter_stone.png" id="owned_shelter_stone">
      <div id="tooltip_owned_shelter_stone" class="invisible tooltip inventory">Shelter Stone</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Mortal Blade" src="img/mortal_blade.png" id="owned_mortal_blade">
      <div id="tooltip_owned_mortal_blade" class="invisible tooltip inventory">Mortal Blade</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Aromatic Branch" src="img/aromatic_branch.png" id="owned_aromatic_branch">
      <div id="tooltip_owned_aromatic_branch" class="invisible tooltip inventory">Aromatic Branch</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Divine Dragon's Tears" src="img/divine_dragons_tears.png" id="owned_divine_dragons_tears">
      <div id="tooltip_owned_divine_dragons_tears" class="invisible tooltip inventory">Divine Dragon's Tears</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Puppeteer Ninjutsu" src="img/puppeteer_ninjutsu.png" id="owned_puppeteer_ninjutsu">
      <div id="tooltip_owned_puppeteer_ninjutsu" class="invisible tooltip inventory">Puppeteer Ninjutsu</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Mibu Breathing Technique" src="img/mibu_breathing_technique.jpg" id="owned_mibu_breathing_technique">
      <div id="tooltip_owned_mibu_breathing_technique" class="invisible tooltip inventory">Mibu Breathing Technique</div>
    </div>
    <div class="element">
      <img class="inventory" alt="Father's Bell Charm" src="img/fathers_bell_charm.png" id="owned_fathers_bell_charm">
      <div id="tooltip_owned_fathers_bell_charm" class="invisible tooltip inventory">Father's Bell Charm</div>
    </div>
    <hr>
  </div>

  <script src="main.js"></script>
  <script type="text/javascript">init();</script>
</body>

</html>
