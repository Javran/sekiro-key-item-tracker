<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta content="utf-8" http-equiv="encoding">
  <title>Sekiro Key Item Tracker</title>
  <link rel="stylesheet" href="main.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="https://sekii.gitlab.io/sekiro-tracker/img/icon.ico">
  <meta property="og:title" content="Sekiro Key Item Tracker">
  <meta property="og:description" content="Tool to track Key Items in Sekiro Randomizer - Key Items assumed to be placed on important locations">
  <meta property="og:image" content="https://sekii.gitlab.io/sekiro-tracker/img/banner.jpg">
  <meta name="twitter:card" content="summary_large_image">
</head>

<body>
  <div id="inventory-container" class="sticky">
  </div>

  <div id="control-panel">
    <div class="control-group">
      <span>Top texts</span>
      <label>Invasion <input type="color" value="#00ff00"></label>
      <label>Dragon <input type="color" value="#0064ff"></label>
      <label>Finish <input type="color" value="#ff0000"></label>
      <label>Size <input type="range" min="12" max="32" value="21"></label>
    </div>

    <div class="control-group">
      <span>Left column</span>
      <label>Required <input type="color" value="#ffffff"></label>
      <label>Keys <input type="color" value="#ffff00"></label>
      <label>Size <input type="range" min="12" max="32" value="21"></label>
    </div>

    <div class="control-group">
      <span>Items</span>
      <label>Invasion <input type="color" value="#00ff00"></label>
      <label>Dragon <input type="color" value="#0064ff"></label>
      <label>Finish <input type="color" value="#ff0000"></label>
      <label>Key <input type="color" value="#ffff00"></label>
      <label>Border <input type="range" min="1" max="10" value="5"></label>
    </div>

    <div class="control-group">
      <span>Misc.</span>
      <label>Transparent BG <input type="checkbox"></label>
    </div>

    <div class="control-group">
      <span>Reset items?</span>
      <label>No <input type="radio" name="reset" value="no" checked></label>
      <label>Yes <input type="radio" name="reset" value="yes"></label>
      <button id="reset-btn">Reset</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>

</html>
